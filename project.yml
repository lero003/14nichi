name: FourteenDayNote

options:
  bundleIdPrefix: jp.hazakura
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  developmentLanguage: ja
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: true

packages:
  FourteenDayCore:
    path: .

targets:
  FourteenDayNote:
    type: application
    platform: iOS
    sources:
      - path: Sources/FourteenDayNoteApp
        excludes:
          # Mac 専用 entitlements。PrivacyInfo.xcprivacy は XcodeGen が resource として取り込む。
          - FourteenDayNoteMac.entitlements
    dependencies:
      - package: FourteenDayCore
        product: FourteenDayCore
    settings:
      base:
        # 初回申請対象のiOS商品で使用する確定済みBundle ID。
        # 既存TestFlightと一致させ、Upload後に変更しない。
        PRODUCT_BUNDLE_IDENTIFIER: jp.hazakura.FourteenDayNote
        PRODUCT_NAME: 14日ノート
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: 14日ノート
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSFaceIDUsageDescription: 緊急カードを表示する際の本人確認に使用します。
        # OS 標準の暗号化のみ（独自暗号プロトコル・通信SDKなし）。Connect の回答と一致させること。
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 6
        MARKETING_VERSION: 1.0.0
        # DEVELOPMENT_TEAM は推測で書かない。Xcode の Signing & Capabilities で選択する。

  FourteenDayNoteMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/FourteenDayNoteApp
        excludes:
          - FourteenDayNoteMac.entitlements
    entitlements:
      path: Sources/FourteenDayNoteApp/FourteenDayNoteMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
    dependencies:
      - package: FourteenDayCore
        product: FourteenDayCore
    settings:
      base:
        # 将来候補。Macを実際に配布するときに商品構成とBundle IDを再レビューする。
        PRODUCT_BUNDLE_IDENTIFIER: jp.hazakura.FourteenDayNote
        PRODUCT_NAME: 14日ノート
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: 14日ノート
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: 0.1.0
        COMBINE_HIDPI_IMAGES: true
        # DEVELOPMENT_TEAM は推測で書かない。Xcode の Signing & Capabilities で選択する。
        # PDF をユーザー指定の任意パスへ直接保存する場合のみ user-selected.read-write を追加する。
        # 現状は一時ディレクトリ + 印刷/プレビュー導線のため Sandbox のみ。

schemes:
  FourteenDayNote:
    build:
      targets:
        FourteenDayNote: all
    run:
      config: Debug
    archive:
      config: Release

  FourteenDayNoteMac:
    build:
      targets:
        FourteenDayNoteMac: all
    run:
      config: Debug
    archive:
      config: Release
