name: FourteenDayNote

options:
  bundleIdPrefix: jp.hazakura
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  developmentLanguage: ja
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: true

packages:
  FourteenDayCore:
    path: .

targets:
  FourteenDayNote:
    type: application
    platform: iOS
    sources:
      - path: Sources/FourteenDayNoteApp
    dependencies:
      - package: FourteenDayCore
        product: FourteenDayCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.hazakura.FourteenDayNote
        PRODUCT_NAME: 14日ノート
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: 14日ノート
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

  FourteenDayNoteMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/FourteenDayNoteApp
    dependencies:
      - package: FourteenDayCore
        product: FourteenDayCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.hazakura.FourteenDayNote.mac
        PRODUCT_NAME: 14日ノート
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: 14日ノート
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        COMBINE_HIDPI_IMAGES: true

schemes:
  FourteenDayNote:
    build:
      targets:
        FourteenDayNote: all
    run:
      config: Debug
    archive:
      config: Release

  FourteenDayNoteMac:
    build:
      targets:
        FourteenDayNoteMac: all
    run:
      config: Debug
    archive:
      config: Release
